name: Release and Publish

on:
  release:
    types: [published]

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v6

    - name: Set up Go
      uses: actions/setup-go@v6
      with:
        go-version: '1.26.4'
        cache: true
        cache-dependency-path: go.sum

    - name: Download dependencies
      run: go mod download

    - name: Verify dependencies
      run: go mod verify

    - name: Check go mod tidy
      run: go mod tidy -diff

    - name: Run go vet
      run: go vet ./...

    - name: Build
      run: go build ./...

    - name: Run tests
      run: go test -race -count=1 ./...

  publish:
    needs: test
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v6
      with:
        fetch-depth: 0

    - name: Set up Go
      uses: actions/setup-go@v6
      with:
        go-version: '1.26.4'
        cache: true
        cache-dependency-path: go.sum

    - name: Warm Go module proxy
      run: |
        TAG_NAME="${{ github.event.release.tag_name }}"
        MODULE_PATH="github.com/${{ github.repository }}"
        echo "Requesting proxy index for $MODULE_PATH@$TAG_NAME"
        curl -fsSL "https://proxy.golang.org/$MODULE_PATH/@v/$TAG_NAME.info" \
          || echo "Proxy not yet aware of the tag; it will be indexed on first external request."

    - name: Verify module is importable
      run: |
        TAG_NAME="${{ github.event.release.tag_name }}"
        MODULE_PATH="github.com/${{ github.repository }}"

        WORKDIR="$(mktemp -d)"
        cd "$WORKDIR"
        go mod init verify-import >/dev/null

        for i in 1 2 3 4 5; do
          echo "Attempt $i/5: go get $MODULE_PATH@$TAG_NAME"
          if GOPROXY=https://proxy.golang.org,direct go get "$MODULE_PATH@$TAG_NAME"; then
            echo "Module is importable."
            exit 0
          fi
          sleep $((i * 10))
        done

        echo "Module did not become importable in time." >&2
        exit 1

    - name: Publish summary
      if: success()
      run: |
        TAG_NAME="${{ github.event.release.tag_name }}"
        MODULE_PATH="github.com/${{ github.repository }}"
        {
          echo "## Package Publication"
          echo ""
          echo "- **Module:** \`$MODULE_PATH\`"
          echo "- **Version:** \`$TAG_NAME\`"
          echo ""
          echo "Install with:"
          echo ""
          echo '```sh'
          echo "go get $MODULE_PATH@$TAG_NAME"
          echo '```'
        } >> "$GITHUB_STEP_SUMMARY"
